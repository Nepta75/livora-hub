name: Integration Continue

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint
        run: yarn lint

      - name: Run TypeScript type check
        run: yarn type-check

  # Runs in parallel with `test` to cut wall-clock time. The sha-tagged image
  # is pushed regardless of test outcome, but :preprod tagging and deploy are
  # gated on both jobs (see deploy-preprod).
  build-image:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/nepta75/livora-hub:sha-${{ env.SHORT_SHA }}
          build-args: |
            ENV=preprod
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Only promote to :preprod and deploy once tests have passed.
  deploy-preprod:
    runs-on: ubuntu-latest
    environment: Preprod
    needs: ["test", "build-image"]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      packages: write
      contents: read

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag sha image as :preprod
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE=ghcr.io/nepta75/livora-hub
          docker buildx imagetools create --tag $IMAGE:preprod $IMAGE:sha-$SHA

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to preprod VPS
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "docker service update --image ghcr.io/nepta75/livora-hub:sha-$SHA --with-registry-auth --detach=false livora_hub"

      - name: Verify rollout
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "for i in 1 2 3 4 5 6; do \
               state=\$(docker service inspect livora_hub --format '{{.UpdateStatus.State}}'); \
               echo \"Rollout state: \${state:-completed}\"; \
               if [ \"\$state\" = 'completed' ] || [ -z \"\$state\" ]; then exit 0; \
               elif echo \"\$state\" | grep -qE 'rollback|paused'; then \
                 echo \"ERROR: rollout failed (state: \$state)\"; docker service ps livora_hub --no-trunc; exit 1; \
               fi; \
               sleep 5; \
             done; \
             echo \"ERROR: timed out waiting for rollout to complete\"; \
             docker service ps livora_hub --no-trunc; exit 1"
